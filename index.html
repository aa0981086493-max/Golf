    * { box-sizing: border-box; }

    body {
        background-color: var(--milk);
        background-image:
            radial-gradient(ellipse at 20% 10%, rgba(232,213,183,0.4) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 90%, rgba(201,168,130,0.25) 0%, transparent 50%);
        color: var(--espresso);
        font-family: 'Noto Serif TC', serif;
        min-height: 100vh;
    }

    .card {
        background: var(--foam);
        border-radius: 22px;
        box-shadow: 0 2px 18px var(--shadow), 0 0 0 1px rgba(201,168,130,0.18);
    }

    /* Header */
    .app-header {
        background: linear-gradient(135deg, var(--espresso) 0%, var(--brown) 60%, var(--taro) 100%);
        border-radius: 26px;
        padding: 22px 20px 18px;
        margin-bottom: 18px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 6px 24px rgba(92,61,30,0.28);
    }
    .app-header::before {
        content: '';
        position: absolute;
        top: -30px; right: -30px;
        width: 120px; height: 120px;
        border-radius: 50%;
        background: rgba(255,255,255,0.07);
    }
    .app-header::after {
        content: '';
        position: absolute;
        bottom: -20px; left: 30px;
        width: 80px; height: 80px;
        border-radius: 50%;
        background: rgba(255,255,255,0.05);
    }
    .app-header h1 {
        font-family: 'DM Serif Display', serif;
        color: #fdf6ee;
        font-size: 22px;
        letter-spacing: 1px;
    }
    .app-header p {
        color: rgba(253,246,238,0.6);
        font-size: 11px;
        letter-spacing: 2px;
    }

    /* Stats Card */
    .stat-card {
        background: linear-gradient(145deg, var(--foam), var(--cream));
        border-radius: 22px;
        box-shadow: 0 2px 18px var(--shadow), 0 0 0 1px rgba(201,168,130,0.2);
        padding: 20px;
        margin-bottom: 16px;
    }
    .stat-box {
        background: var(--milk);
        border-radius: 16px;
        padding: 14px 10px;
        box-shadow: inset 0 1px 4px rgba(139,99,71,0.06);
    }
    .stat-label { font-size: 9px; color: var(--taro); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 4px; }
    .stat-value { font-family: 'DM Serif Display', serif; font-size: 20px; }
    .val-revenue { color: #a0522d; }
    .val-cost    { color: var(--brown); }
    .val-profit  { color: #5a7a3a; }
    .val-orders  { color: #5b7fa6; }

    /* Select */
    select {
        background: var(--cream);
        border: 1px solid var(--latte);
        border-radius: 10px;
        padding: 5px 10px;
        font-size: 12px;
        color: var(--espresso);
        font-family: 'Noto Serif TC', serif;
        outline: none;
        cursor: pointer;
    }

    /* Section label */
    .section-label {
        font-size: 9px;
        letter-spacing: 2.5px;
        color: var(--taro);
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 14px;
    }

    /* Details / Accordion */
    details {
        border-radius: 20px;
        overflow: hidden;
        margin-bottom: 12px;
        box-shadow: 0 2px 14px var(--shadow), 0 0 0 1px rgba(201,168,130,0.18);
    }
    details summary {
        background: linear-gradient(135deg, var(--cream) 0%, var(--latte) 100%);
        padding: 16px 18px;
        font-size: 13px;
        font-weight: 700;
        color: var(--espresso);
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        letter-spacing: 0.3px;
    }
    details summary::-webkit-details-marker { display: none; }
    details[open] summary {
        background: linear-gradient(135deg, var(--latte) 0%, var(--taro) 100%);
        color: var(--foam);
    }
    details .inner {
        background: var(--foam);
        padding: 18px;
    }

    /* Inputs */
    label {
        font-size: 10px;
        color: var(--taro);
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 4px;
        display: block;
    }
    input[type="text"], input[type="number"], input[type="date"] {
        background: var(--milk);
        border: 1.5px solid var(--latte);
        border-radius: 14px;
        padding: 13px 16px;
        font-size: 16px;
        width: 100%;
        margin-bottom: 4px;
        color: var(--espresso);
        font-family: 'Noto Serif TC', serif;
        transition: border-color 0.2s;
        outline: none;
    }
    input:focus {
        border-color: var(--taro);
        background: var(--foam);
    }

    /* Buttons */
    .btn-primary {
        background: linear-gradient(135deg, var(--brown) 0%, var(--espresso) 100%);
        color: var(--foam);
        border: none;
        border-radius: 16px;
        padding: 15px;
        font-family: 'Noto Serif TC', serif;
        font-size: 14px;
        font-weight: 700;
        width: 100%;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(92,61,30,0.25);
        letter-spacing: 0.5px;
        transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(92,61,30,0.2); }

    .btn-secondary {
        background: linear-gradient(135deg, var(--taro) 0%, var(--brown) 100%);
        color: var(--foam);
        border: none;
        border-radius: 16px;
        padding: 15px;
        font-family: 'Noto Serif TC', serif;
        font-size: 14px;
        font-weight: 700;
        width: 100%;
        cursor: pointer;
        box-shadow: 0 4px 14px rgba(139,99,71,0.22);
        letter-spacing: 0.5px;
        transition: transform 0.15s;
    }
    .btn-secondary:active { transform: scale(0.98); }

    .btn-backup {
        background: linear-gradient(135deg, #6b7f45 0%, #4a5c2a 100%);
        color: #f5f9ec;
        border: none;
        border-radius: 16px;
        padding: 16px;
        font-family: 'Noto Serif TC', serif;
        font-size: 14px;
        font-weight: 700;
        width: 100%;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(74,92,42,0.28);
        letter-spacing: 0.5px;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        transition: transform 0.15s;
    }
    .btn-backup:active { transform: scale(0.98); }

    /* Tabs */
    .tab-bar {
        display: flex;
        gap: 6px;
        background: var(--cream);
        border-radius: 14px;
        padding: 5px;
        margin-bottom: 14px;
    }
    .btn-tab {
        flex: 1;
        padding: 9px 4px;
        border-radius: 10px;
        border: none;
        font-family: 'Noto Serif TC', serif;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        background: transparent;
        color: var(--taro);
        transition: all 0.2s;
        letter-spacing: 0.3px;
    }
    .btn-tab.active {
        background: var(--espresso);
        color: var(--foam);
        box-shadow: 0 3px 10px rgba(92,61,30,0.22);
    }

    .sub-tab-bar { display: flex; justify-content: center; gap: 24px; margin-bottom: 14px; }
    .btn-sub-tab {
        font-family: 'Noto Serif TC', serif;
        font-size: 12px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        padding-bottom: 4px;
        color: var(--taro);
        cursor: pointer;
        font-weight: 600;
    }
    .btn-sub-tab.active {
        color: var(--brown);
        border-bottom-color: var(--brown);
    }

    /* Table */
    th {
        font-size: 9px;
        letter-spacing: 1.5px;
        color: var(--taro);
        border-bottom: 1px solid var(--latte);
        padding: 10px 6px;
        font-weight: 700;
        text-transform: uppercase;
    }
    td {
        font-size: 13px;
        padding: 14px 6px;
        border-bottom: 1px solid rgba(232,213,183,0.5);
        vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }

    .del-btn {
        color: #b85c5c;
        font-size: 10px;
        font-weight: 700;
        border: 1px solid rgba(184,92,92,0.2);
        background: rgba(184,92,92,0.05);
        padding: 5px 10px;
        border-radius: 8px;
        cursor: pointer;
    }

    /* Data panel card */
    .data-card {
        background: var(--foam);
        border-radius: 22px;
        padding: 16px;
        min-height: 380px;
        margin-bottom: 16px;
        box-shadow: 0 2px 18px var(--shadow), 0 0 0 1px rgba(201,168,130,0.18);
    }

    /* Backup card */
    .backup-card {
        background: linear-gradient(145deg, #f9f6f0, var(--cream));
        border-radius: 22px;
        padding: 20px;
        border: 2px dashed var(--latte);
        margin-bottom: 24px;
        box-shadow: 0 2px 12px var(--shadow);
    }

    /* Empty state */
    #emptyState { color: var(--latte); font-size: 12px; text-align: center; padding: 40px 0; font-style: italic; }

    /* Chart container */
    .chart-wrap { width: 100%; height: 175px; margin-top: 16px; }

    /* Profit badge */
    .profit-badge { color: #5a7a3a; font-size: 10px; }
    .item-name { font-weight: 700; color: var(--espresso); }

    /* Divider row */
    .backup-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
    .backup-row label { margin: 0; white-space: nowrap; font-size: 11px; }

    /* Clear btn */
    .clear-btn { font-size: 10px; color: rgba(201,168,130,0.6); background: none; border: none; cursor: pointer; font-family: 'Noto Serif TC', serif; }
</style>

<!-- Header -->

<script>
    let moneyRecords = JSON.parse(localStorage.getItem('Golf_M_V13')) || [];
    let qtyRecords   = JSON.parse(localStorage.getItem('Golf_Q_V13'))  || [];
    let currentTab    = 'money';
    let currentSubTab = 'detail';
    let revenueChart  = null;

    document.getElementById('moneyDate').valueAsDate = new Date();
    document.getElementById('qtyDate').valueAsDate   = new Date();

    const nowM = new Date();
    document.getElementById('backupMonth').value = (nowM.getMonth()+1).toString().padStart(2,'0');
    document.getElementById('backupYear').value  = nowM.getFullYear().toString();

    function updateChart() {
        const ctx = document.getElementById('revenueChart').getContext('2d');
        const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
        const vals   = new Array(12).fill(0);
        const yr     = new Date().getFullYear().toString();
        moneyRecords.forEach(r => {
            if (r.date.startsWith(yr)) vals[parseInt(r.date.split('-')[1])-1] += Number(r.price);
        });
        if (revenueChart) revenueChart.destroy();
        revenueChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: months,
                datasets: [{
                    label: '營業額',
                    data: vals,
                    backgroundColor: 'rgba(139,99,71,0.65)',
                    borderRadius: 6,
                    hoverBackgroundColor: '#8b6347',
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { font: { size: 9 }, color: '#c9a882' }, grid: { color: 'rgba(201,168,130,0.12)' } },
                    x: { ticks: { font: { size: 9 }, color: '#c9a882' }, grid: { display: false } }
                }
            }
        });
    }

    function render() {
        const listBody  = document.getElementById('listBody');
        const tableHead = document.getElementById('tableHead');
        const emptyState= document.getElementById('emptyState');
        const period    = document.getElementById('statPeriod').value;
        const now       = new Date();
        const thisMonth = now.getFullYear() + '-' + (now.getMonth()+1).toString().padStart(2,'0');
        const thisYear  = now.getFullYear().toString();

        listBody.innerHTML = '';
        let totalRevenue=0, totalCost=0, totalProfit=0, totalOrders=0;
        updateDatalists();
        updateChart();

        moneyRecords.forEach(r => {
            const isMonth = r.date.startsWith(thisMonth);
            const isYear  = r.date.startsWith(thisYear);
            const p       = Number(r.price) - Number(r.cost);
            if (period==='total' || (period==='year' && isYear) || (period==='month' && isMonth)) {
                totalRevenue += Number(r.price);
                totalCost    += Number(r.cost);
                totalProfit  += p;
                totalOrders++;
            }
        });

        if (currentTab === 'money') {
            document.getElementById('qtySubTabs').classList.add('hidden');
            tableHead.innerHTML = `<tr><th style="width:44px">日期</th><th>品項</th><th style="text-align:right">售／成</th><th style="text-align:right;width:52px">操作</th></tr>`;
            emptyState.style.display = moneyRecords.length===0 ? 'block' : 'none';
            moneyRecords.forEach((item, idx) => {
                const p = item.price - item.cost;
                listBody.innerHTML += `<tr>
                    <td style="color:var(--taro);font-size:10px;font-variant-numeric:tabular-nums">${item.date.slice(5)}</td>
                    <td><span class="item-name">${item.name}</span><br><span class="profit-badge">利潤 $${p}</span></td>
                    <td style="text-align:right;font-size:10px;color:var(--taro)">$${item.price}<br>$${item.cost}</td>
                    <td style="text-align:right"><button onclick="deleteRecord('money',${idx})" class="del-btn">刪除</button></td>
                </tr>`;
            });
        } else {
            document.getElementById('qtySubTabs').classList.remove('hidden');
            emptyState.style.display = qtyRecords.length===0 ? 'block' : 'none';
            if (currentSubTab === 'detail') {
                tableHead.innerHTML = `<tr><th style="width:44px">日期</th><th>球種</th><th style="text-align:right">數量</th><th style="text-align:right;width:52px">操作</th></tr>`;
                qtyRecords.forEach((r, idx) => {
                    listBody.innerHTML += `<tr>
                        <td style="color:var(--taro);font-size:10px">${r.date.slice(5)}</td>
                        <td class="item-name">${r.name}</td>
                        <td style="text-align:right;font-weight:700;color:#5b7fa6">${r.qty}顆</td>
                        <td style="text-align:right"><button onclick="deleteRecord('qty',${idx})" class="del-btn">刪除</button></td>
                    </tr>`;
                });
            } else {
                tableHead.innerHTML = `<tr><th>排名</th><th>球種名稱</th><th style="text-align:right;color:#5b7fa6">總累計</th></tr>`;
                const rank = {};
                qtyRecords.forEach(r => { rank[r.name] = (rank[r.name]||0) + Number(r.qty); });
                Object.entries(rank).sort((a,b)=>b[1]-a[1]).forEach(([name,qty],i)=>{
                    listBody.innerHTML += `<tr>
                        <td style="color:var(--latte);font-style:italic;font-size:12px">No.${i+1}</td>
                        <td class="item-name">${name}</td>
                        <td style="text-align:right;font-weight:700;color:#5b7fa6;font-size:16px">${qty}顆</td>
                    </tr>`;
                });
            }
        }

        document.getElementById('totalRevenue').innerText = `$${totalRevenue.toLocaleString()}`;
        document.getElementById('totalCost').innerText    = `$${totalCost.toLocaleString()}`;
        document.getElementById('totalProfit').innerText  = `$${totalProfit.toLocaleString()}`;
        document.getElementById('totalOrders').innerText  = `${totalOrders} 單`;

        localStorage.setItem('Golf_M_V13', JSON.stringify(moneyRecords));
        localStorage.setItem('Golf_Q_V13', JSON.stringify(qtyRecords));
    }

    function backupToLine() {
        const selMonth = document.getElementById('backupMonth').value;
        const selYear  = document.getElementById('backupYear').value;
        let filtered   = moneyRecords.filter(r =>
            selMonth==='all' ? r.date.startsWith(selYear) : r.date.startsWith(`${selYear}-${selMonth}`)
        );
        if (!filtered.length) { alert('這個月份沒有帳務紀錄可以備份！'); return; }
        filtered = [...filtered].sort((a,b)=>a.date.localeCompare(b.date));
        const totalRevenue = filtered.reduce((s,r)=>s+Number(r.price),0);
        const totalCost    = filtered.reduce((s,r)=>s+Number(r.cost),0);
        const monthLabel   = selMonth==='all' ? `${selYear}年全部` : `${selYear}年${parseInt(selMonth)}月`;
        const lines        = filtered.map(r=>{
            const m = parseInt(r.date.slice(5,7));
            const d = parseInt(r.date.slice(8,10));
            return `${m}/${d}${r.name} 💰 ${Number(r.price).toLocaleString()}`;
        });
        let text = `⛳️⛳️⛳️ ${monthLabel} 帳務備份 ⛳️⛳️⛳️\n`;
        text += `─────────────────\n`;
        text += lines.join('\n') + '\n';
        text += `─────────────────\n`;
        text += `成本 💰 ${totalCost.toLocaleString()}\n\n`;
        text += `🚩🚩🚩 💰 ${totalRevenue.toLocaleString()} 💰 🚩🚩🚩\n`;
        text += `淨利潤：${(totalRevenue-totalCost).toLocaleString()}\n`;
        text += `共 ${filtered.length} 單`;
        if (navigator.share) {
            navigator.share({ title:`上品高爾夫${monthLabel}備份`, text }).catch(()=>{});
        } else {
            navigator.clipboard.writeText(text)
                .then(()=>alert('已複製到剪貼板！請貼到 LINE 記事本保存。'))
                .catch(()=>alert('請截圖保存：\n\n'+text));
        }
    }

    function updateDatalists() {
        const names  = [...new Set([...moneyRecords.map(r=>r.name),...qtyRecords.map(r=>r.name)])];
        const prices = [...new Set(moneyRecords.map(r=>r.price))];
        const costs  = [...new Set(moneyRecords.map(r=>r.cost))];
        fillDL('allItemHistory', names);
        fillDL('priceHistory', prices);
        fillDL('costHistory', costs);
    }
    function fillDL(id, list) {
        const dl=document.getElementById(id); dl.innerHTML='';
        list.forEach(v=>{ const o=document.createElement('option'); o.value=v; dl.appendChild(o); });
    }
    function autoFillPrice(name) {
        const r = moneyRecords.find(r=>r.name===name);
        if (r) {
            document.getElementById('price').placeholder = '上次: '+r.price;
            document.getElementById('cost').placeholder  = '上次: '+r.cost;
        }
    }
    function addMoneyRecord() {
        const date=document.getElementById('moneyDate').value;
        const name=document.getElementById('moneyItemName').value;
        const price=document.getElementById('price').value;
        const cost=document.getElementById('cost').value;
        if (!name||!price||!cost) return alert('請完整輸入');
        moneyRecords.unshift({date,name,price,cost}); render();
        document.getElementById('moneyItemName').value='';
        document.getElementById('price').value='';
        document.getElementById('cost').value='';
    }
    function addQtyRecord() {
        const date=document.getElementById('qtyDate').value;
        const name=document.getElementById('qtyItemName').value;
        const qty=document.getElementById('qtyValue').value;
        if (!name||!qty) return alert('請完整輸入');
        qtyRecords.unshift({date,name,qty}); render();
        document.getElementById('qtyItemName').value='';
        document.getElementById('qtyValue').value='';
    }
    function switchTab(tab) {
        currentTab=tab;
        document.querySelectorAll('.btn-tab').forEach(b=>b.classList.remove('active'));
        document.getElementById('tab'+tab[0].toUpperCase()+tab.slice(1)).classList.add('active');
        render();
    }
    function switchSubTab(sub) {
        currentSubTab=sub;
        document.querySelectorAll('.btn-sub-tab').forEach(b=>b.classList.remove('active'));
        document.getElementById('subTab'+sub[0].toUpperCase()+sub.slice(1)).classList.add('active');
        render();
    }
    function deleteRecord(type, idx) {
        if (!confirm('刪除這筆紀錄？')) return;
        if (type==='money') moneyRecords.splice(idx,1); else qtyRecords.splice(idx,1);
        render();
    }
    function clearAll() {
        if (confirm('警告：這將徹底清除所有歷史紀錄！')) { moneyRecords=[]; qtyRecords=[]; render(); }
    }
    render();
</script>
